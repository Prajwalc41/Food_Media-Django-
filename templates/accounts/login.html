{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Food Media</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="toast-container">
  {% for message in messages %}
  <div class="toast {{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🍴 Food Media</div>
      <p class="auth-subtitle">Welcome back, food lover!</p>
    </div>
    <div class="auth-body">
      {% if error %}
      <div style="background:rgba(224,122,95,0.12);border:1px solid var(--color-persimmon);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;color:var(--color-persimmon);font-weight:600;font-size:14px;">
        ❌ {{ error }}
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_username">Username</label>
          <input class="form-control" type="text" name="username" id="id_username" placeholder="Your username" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label" for="id_password">Password</label>
          <input class="form-control" type="password" name="password" id="id_password" placeholder="Your password" required>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
          <input type="checkbox" name="remember_me" id="id_remember_me" style="width:18px;height:18px;cursor:pointer;accent-color:var(--color-sage);">
          <label for="id_remember_me" style="font-size:14px;cursor:pointer;">Remember me for 2 weeks</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-login">Sign In 🍽️</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--color-muted-text);">
        New here? <a href="{% url 'register' %}" style="color:var(--color-sage);font-weight:700;">Create an account</a>
      </p>
    </div>
  </div>
</div>
<script>document.querySelectorAll('.toast').forEach(function(t){setTimeout(function(){t.remove();},3500);});</script>
</body>
</html>
